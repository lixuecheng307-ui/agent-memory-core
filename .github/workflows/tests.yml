name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  memory-core:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Run tests
        run: |
          python -m pytest tests/test_MEMORY_CORE_RAG_ACCEPTANCE.py tests/test_MEMORY_CORE_HISTORY_TRACE_GRAPH.py -q
